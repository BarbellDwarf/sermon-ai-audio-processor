# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sermon-processor
  namespace: sermon-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sermon-processor
  template:
    metadata:
      labels:
        app: sermon-processor
    spec:
      containers:
      - name: sermon-processor
        image: sermon-processor:latest
        ports:
        - containerPort: 8501
          name: web
        - containerPort: 8000
          name: api
        env:
        - name: SERMONAUDIO_API_KEY
          valueFrom:
            secretKeyRef:
              name: sermon-secrets
              key: sermonaudio-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: sermon-secrets
              key: openai-api-key
        envFrom:
        - configMapRef:
            name: sermon-config
        volumeMounts:
        - name: sermon-data
          mountPath: /data
        - name: sermon-models
          mountPath: /models
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: 1
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
        livenessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8501
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: sermon-data
        persistentVolumeClaim:
          claimName: sermon-data-pvc
      - name: sermon-models
        emptyDir:
          sizeLimit: 50Gi