# k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: sermon-secrets
  namespace: sermon-processor
type: Opaque
data:
  # Base64 encoded secrets
  # To encode: echo -n 'your-api-key' | base64
  sermonaudio-api-key: # your-sermonaudio-api-key-base64-encoded
  openai-api-key: # your-openai-api-key-base64-encoded
  anthropic-api-key: # your-anthropic-api-key-base64-encoded
  xai-api-key: # your-xai-api-key-base64-encoded
  postgres-password: # your-postgres-password-base64-encoded