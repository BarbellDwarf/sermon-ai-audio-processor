# docker-compose.yml
# Usage:
#   NVIDIA: docker compose up -d
#   AMD:    GPU_BACKEND=rocm docker compose up -d
#   CPU:    GPU_BACKEND=cpu docker compose up -d

services:
  sermon-processor:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GPU_BACKEND: ${GPU_BACKEND:-cuda}
    container_name: sermon-processor
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/sermon_processor.db}
      - SERMONAUDIO_API_KEY=${SERMONAUDIO_API_KEY}
      - SERMONAUDIO_BROADCASTER_ID=${SERMONAUDIO_BROADCASTER_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEBUG=${DEBUG:-false}
    volumes:
      - sermon_data:/data
      - sermon_models:/models
      - sermon_logs:/app/logs
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: 1
              capabilities: [gpu]
    networks:
      - sermon_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  ollama:
    image: ollama/ollama:latest
    container_name: sermon-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: ${GPU_DRIVER:-nvidia}
              count: 1
              capabilities: [gpu]
    networks:
      - sermon_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  sermon_data:
  sermon_models:
  sermon_logs:
  ollama_data:

networks:
  sermon_network:
    driver: bridge
