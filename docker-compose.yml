services:
  sermon-pilot:
    image: ghcr.io/barbelldwarf/sermonpilot:${SERMONPILOT_TAG:-latest}
    container_name: sermon-pilot
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/sermon_processor.db}
      - SERMONAUDIO_API_KEY=${SERMONAUDIO_API_KEY}
      - SERMONAUDIO_BROADCASTER_ID=${SERMONAUDIO_BROADCASTER_ID}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - DEBUG=${DEBUG:-false}
    volumes:
      - sermon_data:/data
      - sermon_models:/models
      - sermon_api_cache:/app/api_cache
      - sermon_output:/app/processed_sermons
      - sermon_cache:/home/sermonapp/.cache
      - sermon_logs:/app/logs
    env_file:
      - .env
    networks:
      - sermon_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  sermon_data:
  sermon_models:
  sermon_api_cache:
  sermon_output:
  sermon_cache:
  sermon_logs:

networks:
  sermon_network:
    driver: bridge
