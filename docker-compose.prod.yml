# docker-compose.prod.yml - Production overrides

services:
  sermon-processor:
    build:
      target: prod
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://sermon_user:${POSTGRES_PASSWORD}@postgres:5432/sermon_processor
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # PostgreSQL (optional, for production)
  postgres:
    image: postgres:15-alpine
    container_name: sermon-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sermon_processor
      - POSTGRES_USER=sermon_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sermon_default_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - sermon_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sermon_user -d sermon_processor"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: sermon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - nginx_logs:/var/log/nginx
    depends_on:
      - sermon-processor
    networks:
      - sermon_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  nginx_logs:

networks:
  sermon_network:
    external: true
    name: sermon-ai-audio-processor_sermon_network