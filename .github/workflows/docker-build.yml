name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      gpu_backend:
        description: 'GPU backend to build'
        type: choice
        options:
          - all
          - cuda
          - rocm
          - cpu
        default: all

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      matrix:
        gpu: ${{ fromJSON(github.event_name == 'workflow_dispatch' && github.event.inputs.gpu_backend == 'all' && '["cuda","rocm","cpu"]' || github.event.inputs.gpu_backend == 'all' && '["cuda","rocm","cpu"]' || '["cuda","rocm","cpu"]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ matrix.gpu }}
            type=raw,value=${{ matrix.gpu }}-{{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GPU_BACKEND=${{ matrix.gpu }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-latest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag cuda as latest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda
