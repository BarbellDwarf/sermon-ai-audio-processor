name: Security Compliance Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run weekly security scan
    - cron: '0 2 * * 1'  # Every Monday at 2 AM UTC

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml
        
    - name: Run security scanner
      run: |
        echo "🔍 Running security scanner..."
        python tools/security_scanner.py --fix-mode
        
    - name: Run security validation
      run: |
        echo "🔒 Running security validation..."
        python tools/validate_security.py
        
    - name: Check configuration security
      run: |
        echo "🔧 Validating configuration security..."
        python src/secure_config.py
        
    - name: Generate security report
      if: failure()
      run: |
        echo "📊 Generating detailed security report..."
        python tools/security_scanner.py --output security_report.txt --verbose
        
    - name: Upload security report
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security_report.txt
        
    - name: Comment on PR (if violations found)
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          let report = '';
          try {
            report = fs.readFileSync('security_report.txt', 'utf8');
          } catch (e) {
            report = 'Security violations detected. Run `python tools/security_scanner.py` locally for details.';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Compliance Check Failed
            
Security violations were detected in this pull request. Please review and fix the issues below:

\`\`\`
${report.substring(0, 2000)}
\`\`\`

### How to fix:
1. Run \`python tools/security_scanner.py\` locally to see all violations
2. Replace hardcoded credentials with environment variables
3. Move test data to proper test fixtures directories
4. Use \`\${VARIABLE_NAME}\` syntax in configuration files

### Tools available:
- \`python tools/security_scanner.py\` - Scan for violations
- \`python tools/validate_security.py\` - Validate compliance
- \`python src/secure_config.py\` - Check configuration security

See \`docs/SECURITY_SETUP_GUIDE.md\` for detailed instructions.`
          });

  credential-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Scan for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified
        
  dependency-security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        
    - name: Check for known vulnerabilities
      run: |
        echo "🔍 Checking for known vulnerabilities in dependencies..."
        safety check --json || true
        
    - name: Run Bandit security linter
      run: |
        echo "🔒 Running Bandit security linter..."
        bandit -r src/ -f json -o bandit_report.json || true
        
    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: bandit-security-report
        path: bandit_report.json