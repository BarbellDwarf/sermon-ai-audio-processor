# SermonAudio Updater Configuration
# Copy this to config.yaml and update with your settings

# SermonAudio API credentials - Use environment variables for security
api_key: "${SERMONAUDIO_API_KEY}"
broadcaster_id: "${SERMONAUDIO_BROADCASTER_ID}"

# LLM Configuration
llm:
  # Primary LLM settings
  primary:
    provider: "ollama"  # Options: "ollama", "openai", "anthropic", "xai", "google", "groq"
    ollama:
      host: "http://localhost:11434"
      model: "llama3"
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-3.5-turbo"
      # base_url: "https://api.openai.com/v1"  # Optional: Custom endpoint for other providers
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-5-sonnet-20241022"  # Default model, can be overridden
    xai:
      api_key: "${XAI_API_KEY}"
      model: "grok-beta"  # Default model, can be overridden
    google:
      api_key: "${GOOGLE_API_KEY}"
      model: "gemini-1.5-flash"  # Default model, can be overridden
    groq:
      api_key: "${GROQ_API_KEY}"
      model: "llama-3.1-70b-versatile"  # Default model, can be overridden
  
  # Fallback LLM settings (used if primary fails)
  fallback:
    enabled: true
    provider: "openai"  # Options: "ollama", "openai", "anthropic", "xai", "google", "groq"
    ollama:
      host: "http://localhost:11434"
      model: "llama2"
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-3.5-turbo"
      # base_url: "https://api.openai.com/v1"  # Optional: Custom endpoint for other providers
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-haiku-20240307"  # Faster/cheaper model for fallback
    xai:
      api_key: "${XAI_API_KEY}"
      model: "grok-beta"
    google:
      api_key: "${GOOGLE_API_KEY}"
      model: "gemini-1.5-flash"
    groq:
      api_key: "${GROQ_API_KEY}"
      model: "llama-3.1-8b-instant"  # Faster model for fallback
  
  # Validation LLM settings (smaller model for description validation)
  validator:
    enabled: true
    provider: "ollama"  # Options: "ollama", "openai", "anthropic", "xai", "google", "groq"
    ollama:
      host: "http://localhost:11434"
      model: "gemma2:2b"  # Smaller, faster model for validation
    openai:
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4o-mini"  # Smaller OpenAI model for validation
      # base_url: "https://api.openai.com/v1"  # Optional: Custom endpoint
    anthropic:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-3-haiku-20240307"  # Fast, affordable model for validation
    google:
      api_key: "${GOOGLE_API_KEY}"
      model: "gemini-1.5-flash"  # Fast model for validation
    groq:
      api_key: "${GROQ_API_KEY}"
      model: "llama-3.1-8b-instant"  # Fast model for validation

# Audio Processing Settings
use_audacity: false  # Set to true if Audacity with mod-script-pipe is available
audio_enhancement_method: "deepfilternet"  # Options: "deepfilternet", "resemble_enhance", "none"
audio_noise_reduction: true
audio_amplify: true
audio_normalize: true
audio_gain_db: 0.5
audio_target_level_db: -22.0

# Q&A Audio Normalization Settings
qa_normalization:
  enabled: false  # Enable Q&A audio normalization
  detection_method: "level_based"  # Options: "level_based", "speaker_diarization", "hybrid"
  target_lufs: -23.0  # Target LUFS level for normalized audio
  main_speaker_threshold: -12.0  # dB threshold for main speaker audio
  question_threshold: -30.0  # dB threshold for audience questions
  look_ahead_ms: 100  # Look-ahead time for transition detection
  transition_smoothing: true  # Apply smoothing at Q&A transitions
  
  # Speaker diarization settings (for future implementation)
  speaker_diarization:
    model: "pyannote/speaker-diarization"  # Model for speaker diarization
    min_speakers: 1  # Minimum number of speakers to detect
    max_speakers: 10  # Maximum number of speakers to detect

# Content Management Settings
content_management:
  database_path: "sermon_processor.db"  # Database file path
  full_text_search: true  # Enable full-text search capabilities
  auto_topic_extraction: true  # Enable automatic topic extraction
  content_backup: true  # Backup content files
  search_suggestions: true  # Enable search auto-complete suggestions
  
# Embedding Configuration for RAG System
embeddings:
  # Primary embedding provider
  primary:
    provider: "sentence_transformers"  # Options: "sentence_transformers", "openai", "ollama"
    model: "all-MiniLM-L6-v2"  # Model name for the provider
    dimensions: 384  # Embedding dimensions (auto-detected for most models)
    
    # Provider-specific configurations
    sentence_transformers:
      model: "all-MiniLM-L6-v2"  # Options: all-MiniLM-L6-v2, all-mpnet-base-v2, all-distilroberta-v1
      # All sentence-transformer models run locally
    
    openai:
      api_key: "${OPENAI_API_KEY}"  # OpenAI API key
      model: "text-embedding-3-small"  # Options: text-embedding-3-small, text-embedding-3-large, text-embedding-ada-002
      base_url: "https://api.openai.com/v1"  # Custom endpoint for other providers
    
    ollama:
      host: "http://localhost:11434"  # Ollama server host
      model: "nomic-embed-text"  # Options: nomic-embed-text, mxbai-embed-large, snowflake-arctic-embed:*
  
  # Fallback embedding providers (tried in order if primary fails)
  fallback:
    - provider: "sentence_transformers"
      model: "all-MiniLM-L6-v2"
    # Hash-based fallback is automatically added as final option

# Web UI Configuration
web_ui:
  items_per_page: 20  # Default items per page in lists
  audio_player_enabled: true  # Enable audio player in viewer
  pdf_generation: true  # Enable PDF transcript generation
  search_suggestions: true  # Show search suggestions
  qa_highlighting: true  # Highlight Q&A segments in transcripts
  analytics_enabled: true  # Enable analytics dashboard

# Processing Options
dry_run: false  # Set to true to preview changes without updating
debug: false    # Set to true to enable verbose debug output
hashtag_verification: true  # Set to true to verify hashtags through a second LLM pass (recommended)

# Output Settings
output_directory: "processed_sermons"  # Directory to store processed sermon files (relative to script or absolute path)
save_original_audio: true  # Save the original downloaded audio file alongside processed audio
save_transcript: true  # Save the sermon transcript as a text file alongside other outputs

# Metadata Processing Settings
metadata_processing:
  enabled: true  # Enable metadata processing (descriptions and hashtags)
  process_audio: true  # Whether to process audio (can be overridden by CLI)
  description:
    update_if_missing: true  # Update only if null/empty
    update_if_minimal: true  # Update if less than min_length_threshold chars
    force_update: false     # Update even if substantial content exists
    min_length_threshold: 50  # Characters to consider "minimal"
    validation:
      enabled: true  # Enable description validation with smaller model
      criteria:
        - "Contains specific theological content or Bible references"
        - "Mentions the speaker's main message or key points"
        - "Is written in a professional, engaging style"
        - "Avoids generic Christian phrases without substance"
        - "Has clear application or takeaway for listeners"
  hashtags:
    update_if_missing: true  # Update only if null/empty  
    update_if_minimal: true  # Update if less than min_length_threshold chars
    force_update: false     # Update even if substantial content exists
    min_length_threshold: 10  # Characters to consider "minimal"

# Default search criteria
default_criteria:
  event_type: "sunday_service"  # Options: sunday_service, sunday_school, midweek_service
  date_range: 7  # Days back from today
