{{/* helm/sermon-processor/templates/service.yaml */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sermon-processor.fullname" . }}
  labels:
    {{- include "sermon-processor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: web
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: api
  selector:
    {{- include "sermon-processor.selectorLabels" . | nindent 4 }}